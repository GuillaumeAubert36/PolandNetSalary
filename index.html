<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Net UoP / B2B</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0B0F19] text-white flex items-center justify-center min-h-screen p-6">
  <div class="fixed top-2 right-2 md:top-3 md:right-4 text-gray-500 text-[10px] md:text-xs font-bold opacity-50 select-none pointer-events-none text-right leading-tight">
    <div>v1.2.0</div>
  </div>
  <div class="w-full max-w-md bg-[#141A25] border border-white/10 rounded-3xl p-8 shadow-2xl backdrop-blur-xl">
    <h1 class="text-3xl font-bold tracking-tight">
      Net Salary
    </h1>

    <p class="text-gray-400 mb-8">
        Net UoP / B2B
    </p>

    <div class="mb-4">
      <label class="block text-gray-700 mb-2">Gross salary (PLN)</label>
      <input
        id="gross"
        type="number"
        placeholder="20 000 PLN"
        class="w-full mt-2 bg-[#1C2333]
        border border-white/10
        rounded-2xl
        px-5
        py-4
        text-2xl
        font-semibold
        outline-none
        focus:border-green-500
        transition">
    </div>

    <button onclick="calculate()" class="w-full
        mt-6
        rounded-2xl
        bg-green-500
        hover:bg-green-400
        text-black
        font-bold
        py-4
        transition">
      Calculate
    </button>

    <div id="results" class="hidden mt-8 space-y-6">
      <p class="font-semibold mb-2">Overview:</p>
      <br>
      <div id="uopBilan" class="mb-4"></div>
      <br>
      <div id="b2bBilan" class="mb-4"></div>
      <div id="info" class="mb-4"></div>
    </div>
  </div>

  <script>
    let plnToEur = 0.24; // Default value.

    async function loadExchangeRate() 
    {      
      try 
      {
        const res = await fetch("https://api.frankfurter.dev/v1/latest?base=PLN&symbols=EUR");
        const data = await res.json();
        console.log(data);
    
        if (data?.rates?.EUR) 
        {
          plnToEur = data.rates.EUR;
          console.log(`Exchange rate loaded: ${plnToEur}`);
        }
      } 
      catch (e) 
      {
        console.warn("Unable to load exchange rate, using fallback value.");
      }
    }

    window.addEventListener("load", loadExchangeRate);
    
    function calculate() 
    {
      const gross = parseFloat(document.getElementById("gross").value);
      
      if (isNaN(gross)) return alert("PLEASE ENTER VALID NUMBER.");

      const flatTax = 0.12; // 12%
      const accountant = 466.17; // InFakt

      // --- UoP ---
      const netUop = gross * 0.7;
      const uopDeductions = gross * 0.3;
      const netUopEUR = netUop * plnToEur;

      // --- B2B ---
      // Choix du régime ZUS
      const zusRegimes = {
        ulga: { label: "Ulga na start (0-6 months)", social: 0.0, health: 0.049 },
        maly: { label: "Mały ZUS (6 months - 2 years)", social: 800.0, health: 0.049 },
        standard: { label: "Standard ZUS (after 2 years)", social: 1300.0, health: 0.049 }
      };

      const regime = zusRegimes["ulga"]; // "ulga" | "maly" | "standard"
      const zusSocial = regime.social;
      const taxableIncome = gross - zusSocial;

      const taxB2B = taxableIncome * flatTax;                           
      const healthBase = 10170.41;
      const healthContribution = healthBase * 0.049;
      const netB2B = gross - taxB2B - zusSocial - healthContribution - accountant;
      const netB2BEUR = netB2B * plnToEur;

      // --- UoP ---
      document.getElementById("uopBilan").innerHTML = `
        <div class="bg-[#1A2130] rounded-3xl border border-white/10 p-6 space-y-3">
          <p class="font-semibold text-lg mb-2">📋 UoP (Umowa o Pracę)</p>
          <p class="text-gray-500 text-xs mb-2">Employment contract</p>

          <div class="flex justify-between">
            <span class="text-gray-600">Gross</span>
            <span class="font-medium">${gross.toFixed(2)} PLN</span>
          </div>

          <div class="flex justify-between text-red-500">
            <span>− Deductions (~30%)</span>
            <span>− ${uopDeductions.toFixed(2)} PLN</span>
          </div>

          <div class="h-px bg-white/10 my-4"></div>

          <div class="mt-5">
            <div class="text-gray-400 text-sm">
              Estimated net
            </div>     
            <div class="text-5xl font-bold text-green-400">
              ${netUop.toFixed(0)}
            </div>    
            <div class="text-gray-400">
              PLN
            </div>          
          </div>

          <div class="flex justify-between font-bold text-green-600 text-base">
            <span>≈ in EUR</span>
            <span>${netUopEUR.toFixed(2)} EUR</span>
          </div>
        </div>
      `;

      // --- B2B ---
      document.getElementById("b2bBilan").innerHTML = `
        <div class="bg-[#1A2130] rounded-3xl border border-white/10 p-6 space-y-3">
          <p class="font-semibold text-lg mb-2">📋 B2B</p>
          <p class="text-gray-500 text-xs mb-2">${regime.label}</p>

          <div class="flex justify-between">
            <span class="text-gray-600">Gross</span>
            <span class="font-medium">${gross.toFixed(2)} PLN</span>
          </div>

          <div class="flex justify-between text-red-500">
            <span>− Flat tax (12%)</span>
            <span>− ${taxB2B.toFixed(2)} PLN</span>
          </div>

          <div class="flex justify-between text-red-500">
            <span>− ZUS Social</span>
            <span>− ${zusSocial.toFixed(2)} PLN</span>
          </div>

          <div class="flex justify-between text-red-500">
            <span>− ZUS Health (4.9%)</span>
            <span>− ${healthContribution.toFixed(2)} PLN</span>
          </div>

          <div class="flex justify-between text-red-500">
            <span>− Accountant (InFakt)</span>
            <span>− ${accountant.toFixed(2)} PLN</span>
          </div>

          <hr class="border-gray-300 my-2"/>

          <div class="flex justify-between font-bold text-green-600 text-base">
            <span>Estimated net</span>
            <span>${netB2B.toFixed(2)} PLN</span>
          </div>

          <div class="flex justify-between font-bold text-green-600 text-base">
            <span>≈ in EUR</span>
            <span>${netB2BEUR.toFixed(2)} EUR</span>
          </div>
        </div>
      `;

      document.getElementById("info").innerHTML = `
        <div class="space-y-1 text-sm">
          <p class="text-gray-400 text-xs mt-2">* Estimation — exchange rate : 1 EUR = ${(1/plnToEur).toFixed(4)} PLN</p>
        </div>
      `;

      document.getElementById("results").classList.remove("hidden");
    }
  </script>
</body>
</html>
